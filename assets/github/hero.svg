<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="50%" stop-color="#0c101f" />
      <stop offset="100%" stop-color="#141a2f" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#0072FF" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.02" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid Overlay -->
  <rect width="1200" height="400" fill="url(#grid)" />
  
  <!-- Cybernetic Grid Perspective Lines -->
  <path d="M 0 350 L 1200 350 M 0 370 L 1200 370 M 0 385 L 1200 385" stroke="#00F0FF" stroke-opacity="0.1" stroke-width="1" />
  
  <!-- Abstract Radar Sweep and Gait Wave Lines (Right Side) -->
  <g transform="translate(800, 200)">
    <!-- Scanning Rings -->
    <circle cx="100" cy="0" r="140" fill="none" stroke="#00F0FF" stroke-opacity="0.08" stroke-width="1.5" />
    <circle cx="100" cy="0" r="100" fill="none" stroke="#00FF88" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="10 8" />
    <circle cx="100" cy="0" r="60" fill="none" stroke="#FF3E3E" stroke-opacity="0.15" stroke-width="1" />

    <!-- Wave line (gait cycle signature) -->
    <path d="M -250 -30 Q -200 80 -150 -50 T -50 40 T 50 -60 T 150 20 T 250 -20" fill="none" stroke="url(#cyanGrad)" stroke-width="3" filter="url(#glowCyan)" />
    
    <!-- Secondary Wave line -->
    <path d="M -250 -10 Q -210 -40 -160 60 T -60 -20 T 40 50 T 140 -30 T 250 10" fill="none" stroke="#00FF88" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 2" />

    <!-- Joint Nodes / Keypoints representation -->
    <circle cx="-150" cy="-50" r="4" fill="#00F0FF" filter="url(#glowCyan)" />
    <circle cx="-50" cy="40" r="5" fill="#00FF88" filter="url(#glowGreen)" />
    <circle cx="50" cy="-60" r="4" fill="#00F0FF" filter="url(#glowCyan)" />
    <circle cx="150" cy="20" r="5" fill="#FF3E3E" filter="url(#glowRed)" />
    
    <!-- Bounding boxes and crosshairs (CCTV style) -->
    <rect x="-170" y="-80" width="40" height="60" fill="none" stroke="#00F0FF" stroke-opacity="0.2" stroke-width="1" />
    <path d="M -170 -65 L -170 -80 L -155 -80 M -145 -80 L -130 -80 L -130 -65 M -130 -35 L -130 -20 L -145 -20 M -155 -20 L -170 -20 L -170 -35" stroke="#00F0FF" stroke-width="1.5" />
    
    <rect x="30" y="-90" width="40" height="60" fill="none" stroke="#00FF88" stroke-opacity="0.2" stroke-width="1" />
    <path d="M 30 -75 L 30 -90 L 45 -90 M 55 -90 L 70 -90 L 70 -75 M 70 -45 L 70 -30 L 55 -30 M 45 -30 L 30 -30 L 30 -45" stroke="#00FF88" stroke-width="1.5" />
  </g>

  <!-- Left Side Text and Branding -->
  <g transform="translate(100, 140)">
    <!-- Decorative Tag -->
    <rect x="0" y="-45" width="155" height="22" rx="4" fill="#00F0FF" fill-opacity="0.1" stroke="#00F0FF" stroke-opacity="0.3" stroke-width="1" />
    <text x="12" y="-30" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#00F0FF" letter-spacing="1.5">RESEARCH PROTOTYPE</text>
    
    <!-- Main Title -->
    <text x="0" y="30" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="1">ARGUS <tspan fill="#00F0FF">AI</tspan></text>
    
    <!-- Subtitle -->
    <text x="2" y="70" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#a4b3d6" letter-spacing="0.5">Gait Recognition Biometric Module</text>
    
    <!-- Features Tags -->
    <g transform="translate(2, 110)">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="130" height="24" rx="12" fill="#14213d" stroke="#00FF88" stroke-opacity="0.4" stroke-width="1" />
      <circle cx="12" cy="12" r="3" fill="#00FF88" />
      <text x="24" y="16" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e0e8f5">GEI Extraction</text>
      
      <!-- Tag 2 -->
      <rect x="140" y="0" width="165" height="24" rx="12" fill="#14213d" stroke="#00F0FF" stroke-opacity="0.4" stroke-width="1" />
      <circle cx="152" cy="12" r="3" fill="#00F0FF" />
      <text x="164" y="16" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e0e8f5">ByGaitLight Embedding</text>
      
      <!-- Tag 3 -->
      <rect x="315" y="0" width="145" height="24" rx="12" fill="#14213d" stroke="#FF3E3E" stroke-opacity="0.4" stroke-width="1" />
      <circle cx="327" cy="12" r="3" fill="#FF3E3E" />
      <text x="339" y="16" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#e0e8f5">Multi-Camera ready</text>
    </g>
  </g>

  <!-- Framing Accents (Corner brackets) -->
  <path d="M 20 40 L 20 20 L 40 20" stroke="#00F0FF" stroke-width="3" fill="none" />
  <path d="M 1180 40 L 1180 20 L 1160 20" stroke="#00F0FF" stroke-width="3" fill="none" />
  <path d="M 20 360 L 20 380 L 40 380" stroke="#00F0FF" stroke-width="3" fill="none" />
  <path d="M 1180 360 L 1180 380 L 1160 380" stroke="#00F0FF" stroke-width="3" fill="none" />
</svg>
