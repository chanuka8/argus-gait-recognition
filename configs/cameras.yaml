# ARGUS Multi-Camera CCTV Configuration
# Production-grade multi-camera surveillance system
# Each camera runs independently with dedicated worker thread, queue, and recognition pipeline

cameras:
  camera_01:
    id: "camera_01"
    name: "Main Entrance"
    type: "rtsp"
    url: "rtsp://admin:password@192.168.1.100:554/stream1"
    device_index: 0
    enabled: true
    priority: 1
    width: 640
    height: 480
    target_fps: 15
    reconnect_interval: 5
    max_reconnect_attempts: 0
    max_queue_size: 10

  camera_02:
    id: "camera_02"
    name: "Side Entrance"
    type: "rtsp"
    url: "rtsp://admin:password@192.168.1.101:554/stream1"
    device_index: 0
    enabled: true
    priority: 2
    width: 640
    height: 480
    target_fps: 15
    reconnect_interval: 5
    max_reconnect_attempts: 0
    max_queue_size: 10

  camera_03:
    id: "camera_03"
    name: "Parking Lot"
    type: "rtsp"
    url: "rtsp://admin:password@192.168.1.102:554/stream1"
    device_index: 0
    enabled: false
    priority: 3
    width: 640
    height: 480
    target_fps: 15
    reconnect_interval: 5
    max_reconnect_attempts: 0
    max_queue_size: 10

defaults:
  width: 640
  height: 480
  target_fps: 15
  reconnect_interval: 5
  max_reconnect_attempts: 0
  max_queue_size: 10
  detection_enabled: true
  tracking_enabled: true
  silhouette_enabled: true
  gei_enabled: true
  recognition_enabled: true

multi_camera:
  enabled: true
  max_concurrent_workers: 4
  statistics_interval: 30
  health_check_interval: 30
  enable_camera_logs: true
  log_rotation_size: 10485760
  log_backup_count: 5

